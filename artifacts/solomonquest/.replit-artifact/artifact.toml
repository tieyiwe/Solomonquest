kind = "web"
previewPath = "/"
title = "SolomonQuest LMS"
version = "1.0.0"
id = "artifacts/solomonquest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24348

[services.development]
run = "pnpm --filter @workspace/solomonquest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solomonquest", "run", "build" ]
publicDir = "artifacts/solomonquest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24348"
BASE_PATH = "/"
